<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AUTOMALL Dashboard</title>
    <link href="https://googleapis.com" rel="stylesheet">
    <style>
        :root {
            --panel-bg: rgba(26, 28, 35, 0.95);
            --input-bg: #2d303e;
            --accent: #00f2ff;
            --accent-red: #ff3131;
            --accent-green: #39ff14;
            --text-main: #e0e0e0;
            --text-dim: #94a3b8;
        }

        body {
            background: linear-gradient(rgba(15, 23, 42, 0.85), rgba(15, 23, 42, 0.85)), 
                        url('https://unsplash.com') no-repeat center center fixed;
            background-size: cover;
            color: var(--text-main);
            font-family: 'Orbitron', 'Segoe UI', sans-serif;
            margin: 0;
            padding: 20px;
            display: flex;
            justify-content: center;
            min-height: 100vh;
        }

        .dashboard {
            background: var(--panel-bg);
            width: 100%;
            max-width: 1100px;
            border-radius: 20px;
            border: 1px solid rgba(255, 255, 255, 0.1);
            padding: 20px;
            box-shadow: 0 20px 50px rgba(0, 0, 0, 0.6);
            backdrop-filter: blur(15px);
            align-self: flex-start;
        }

        .header h1 {
            text-transform: uppercase;
            letter-spacing: 3px;
            margin: 0;
            font-size: clamp(24px, 5vw, 48px); /* Адаптивный размер шрифта */
            text-align: center;
        }
        .header h1 span.auto { color: var(--accent-red); }
        .header h1 span.mall { color: #ffffff; }
        .header p {
            text-align: center;
            color: var(--text-dim);
            font-size: 12px;
            letter-spacing: 2px;
            margin-bottom: 30px;
        }

        /* --- СЕТКА: АДАПТИВНОСТЬ --- */
        .grid-layout {
            display: grid;
            grid-template-columns: 1fr; /* По умолчанию для ТЕЛЕФОНА */
            gap: 20px;
        }

        /* Для ПЛАНШЕТА и НОУТБУКА увеличиваем колонки */
        @media (min-width: 900px) {
            .grid-layout {
                grid-template-columns: 1fr 1.2fr;
                gap: 40px;
            }
            .dashboard { padding: 40px; border-radius: 40px; }
        }

        .input-box {
            background: var(--input-bg);
            padding: 12px 15px;
            border-radius: 12px;
            border-left: 4px solid var(--accent-red);
            margin-bottom: 12px;
        }

        .currency-switch {
            display: flex;
            gap: 10px;
            margin-bottom: 20px;
        }

        .currency-btn {
            flex: 1;
            padding: 12px;
            border: 1px solid var(--accent-red);
            background: transparent;
            color: var(--accent-red);
            cursor: pointer;
            border-radius: 8px;
            font-family: 'Orbitron';
            font-weight: bold;
            transition: 0.3s;
        }

        .currency-btn.active {
            background: var(--accent-red);
            color: #fff;
        }

        label { display: block; font-size: 10px; color: var(--text-dim); text-transform: uppercase; margin-bottom: 5px; }
        input { width: 100%; background: transparent; border: none; color: white; font-size: 18px; outline: none; font-family: 'Orbitron'; }

        .display-panel {
            background: rgba(0, 0, 0, 0.3);
            border-radius: 20px;
            padding: 20px;
            display: flex;
            flex-direction: column;
            justify-content: space-between;
            border: 1px solid rgba(255, 255, 255, 0.05);
        }

        .main-stat { text-align: center; margin-bottom: 20px; }
        .main-stat span { 
            font-size: clamp(30px, 6vw, 42px); 
            color: var(--accent-green); 
            display: block;
            margin-top: 5px;
        }

        .stat-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 10px;
        }

        .stat-card {
            background: rgba(255,255,255,0.03);
            padding: 15px;
            border-radius: 12px;
            text-align: center;
        }
        .stat-card b { display: block; font-size: 14px; margin-top: 5px; }

        .action-btn {
            background: linear-gradient(90deg, #ff3131, #990000);
            color: white;
            border: none;
            padding: 18px;
            border-radius: 12px;
            font-weight: bold;
            cursor: pointer;
            text-transform: uppercase;
            margin-top: 20px;
            font-family: 'Orbitron';
            width: 100%;
        }

        .table-container {
            margin-top: 30px;
            overflow-x: auto; /* Для скролла на узких экранах */
            background: rgba(0,0,0,0.4);
            border-radius: 15px;
            display: none;
        }

        table { width: 100%; border-collapse: collapse; min-width: 500px; }
        th { background: #111; color: var(--accent-red); padding: 12px; text-align: left; font-size: 12px; }
        td { padding: 12px; border-bottom: 1px solid rgba(255,255,255,0.05); font-size: 13px; }

    </style>
</head>
<body>

<div class="dashboard">
    <div class="header">
        <h1><span class="auto">AUTO</span><span class="mall">MALL</span></h1>
        <p>МУЛЬТИБРЕНДДИК УНАА САЛОНУ</p>
    </div>
    
    <div class="grid-layout">
        <div class="controls">
            <div class="currency-switch">
                <button class="currency-btn active" onclick="setCurrency('сом', this)">СОМ</button>
                <button class="currency-btn" onclick="setCurrency('$', this)">USD ($)</button>
            </div>
            <div class="input-box"><label>Стоимость авто</label><input type="number" id="price" value="2500000" oninput="calculate()"></div>
            <div class="input-box"><label>Первый взнос</label><input type="number" id="down" value="700000" oninput="calculate()"></div>
            <div class="input-box"><label>Ставка (%)</label><input type="number" id="rate" value="18" oninput="calculate()"></div>
            <div class="input-box"><label>Срок (мес)</label><input type="number" id="months" value="36" oninput="calculate()"></div>
        </div>

        <div class="display-panel">
            <div class="main-stat">
                <label>Ежемесячный платеж</label>
                <span id="res-monthly">0</span>
            </div>
            <div class="stat-grid">
                <div class="stat-card"><label>Кредит</label><b id="res-loan">0</b></div>
                <div class="stat-card"><label>Переплата</label><b id="res-overpay" style="color: #ff4d4d;">0</b></div>
                <div class="stat-card"><label>Ставка</label><b id="res-eff">0%</b></div>
                <div class="stat-card"><label>Всего</label><b id="res-total">0</b></div>
            </div>
            <button class="action-btn" onclick="generateTable()">График платежей</button>
        </div>
    </div>

    <div class="table-container" id="table-box">
        <table>
            <thead><tr><th>№</th><th>Платеж</th><th>Долг</th><th>%</th><th>Остаток</th></tr></thead>
            <tbody id="table-body"></tbody>
        </table>
    </div>
</div>

<script>
let currentCurrency = 'сом';

function setCurrency(cur, btn) {
    currentCurrency = cur;
    document.querySelectorAll('.currency-btn').forEach(b => b.classList.remove('active'));
    btn.classList.add('active');
    calculate();
}

function format(num) {
    return new Intl.NumberFormat('ru-RU').format(Math.round(num)) + ' ' + currentCurrency;
}

function calculate() {
    const price = parseFloat(document.getElementById('price').value) || 0;
    const down = parseFloat(document.getElementById('down').value) || 0;
    const annualRate = parseFloat(document.getElementById('rate').value) || 0;
    const months = parseInt(document.getElementById('months').value) || 0;

    const loanAmount = price - down;
    const monthlyRate = (annualRate / 100) / 12;

    let monthlyPayment = 0;
    if (loanAmount > 0 && months > 0) {
        if (monthlyRate > 0) {
            monthlyPayment = loanAmount * (monthlyRate * Math.pow(1 + monthlyRate, months)) / (Math.pow(1 + monthlyRate, months) - 1);
        } else {
            monthlyPayment = loanAmount / months;
        }
    }

    document.getElementById('res-monthly').innerText = format(monthlyPayment);
    document.getElementById('res-loan').innerText = format(loanAmount);
    document.getElementById('res-overpay').innerText = format((monthlyPayment * months) - loanAmount);
    document.getElementById('res-eff').innerText = annualRate + '%';
    document.getElementById('res-total').innerText = format((monthlyPayment * months) + down);
}

function generateTable() {
    const price = parseFloat(document.getElementById('price').value) || 0;
    const down = parseFloat(document.getElementById('down').value) || 0;
    const annualRate = parseFloat(document.getElementById('rate').value) || 0;
    const months = parseInt(document.getElementById('months').value) || 0;
    
    let loanBalance = price - down;
    const monthlyRate = (annualRate / 100) / 12;
    const monthlyPayment = loanBalance * (monthlyRate * Math.pow(1 + monthlyRate, months)) / (Math.pow(1 + monthlyRate, months) - 1);

    const tbody = document.getElementById('table-body');
    const tableBox = document.getElementById('table-box');
    tbody.innerHTML = '';
    tableBox.style.display = 'block';

    for (let i = 1; i <= months; i++) {
        const interest = loanBalance * monthlyRate;
        const principal = monthlyPayment - interest;
        loanBalance -= principal;
        tbody.innerHTML += `<tr><td>${i}</td><td>${format(monthlyPayment)}</td><td>${format(principal)}</td><td>${format(interest)}</td><td>${format(Math.max(0, loanBalance))}</td></tr>`;
    }
    tableBox.scrollIntoView({ behavior: 'smooth' });
}

calculate();
</script>
</body>
</html>
